name: 'oci-build'
description: 'Build extension OCI image'

inputs:
  ref:
    required: false
    description: 'The branch, tag or SHA to checkout.'
  containerfile:
    required: false
    description: 'The containerfile to use to build the image'
    default: './Containerfile'

outputs:
  artifact-id:
    value: ${{ steps.upload-oci-image.outputs.artifact-id }}
    description: 'A unique identifier for the artifact that was just uploaded. '
  artifact-name:
    value: 'artifact'
    description: 'The name of the artifact that was just uploaded. '

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        ref: ${{ inputs.ref }}

    - name: Build Image
      uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 #v2.13
      with:
        image: localhost/image
        containerfiles: ${{ inputs.containerfile }}
        context: .
        extra-args: |
          --squash
          --tag oci-archive:oci-image.tar

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      id: upload-oci-image
      with:
        name: 'artifact'
        path: oci-image.tar
